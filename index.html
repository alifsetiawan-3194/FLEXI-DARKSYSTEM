<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Flexi 2026 - Data Terkonsolidasi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; background: #f4f7f6; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .header-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 25px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 1000; font-weight: bold; font-size: 14px; border: 1px solid #00529c;
        }
        .sidebar {
            position: absolute; top: 80px; right: 20px; width: 360px;
            background: white; border-radius: 12px; padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 88vh; overflow-y: auto;
        }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #00529c; }
        .stat-card small { color: #666; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .stat-card div { font-weight: bold; font-size: 16px; color: #333; }
        .chart-container { margin-bottom: 20px; padding: 10px; background: #fff; border-radius: 8px; border: 1px solid #eee; }
        .chart-label { font-size: 12px; font-weight: bold; color: #444; margin-bottom: 8px; display: block; border-left: 3px solid #00529c; padding-left: 8px; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 5px solid #f3f3f3; border-radius: 50%; border-top: 5px solid #00529c; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .company-item { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .risk-badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; color: #1a1a1a; font-weight: bold; border: 1px solid rgba(0,0,0,0.1); }
        button.reset-btn { width: 100%; padding: 10px; background: #00529c; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading-text">Memproses Data Flexi...</div>
    </div>
    
    <div class="header-title">STRATEGIC PERFORMANCE DASHBOARD 2026</div>

    <div class="sidebar">
        <div style="display:flex; justify-content:space-between; gap:8px;">
            <div class="stat-card" style="flex:1;">
                <small>Total Sales (YTD)</small>
                <div id="total-os">Rp 0</div>
            </div>
            <div class="stat-card" style="flex:1; border-left-color: #27ae60;">
                <small>Total NOA</small>
                <div id="total-noa">0</div>
            </div>
        </div>
        <div class="stat-card" style="border-left-color: #e53e3e;">
            <small>Total Tunggakan (Risk)</small>
            <div id="total-risk">Rp 0</div>
        </div>

        <div class="chart-container">
            <span class="chart-label">Tren Bulanan (Sales dalam M)</span>
            <div style="height: 150px;"><canvas id="trendChart"></canvas></div>
        </div>
        
        <div class="chart-container">
            <span class="chart-label" id="bar-title">Top 5 Cabang (Sales)</span>
            <div style="height: 180px;"><canvas id="barChart"></canvas></div>
        </div>
        
        <div id="company-info" style="display: none;">
            <span class="chart-label">Instansi Berisiko</span>
            <div id="company-list"></div>
        </div>
        <button onclick="location.reload()" class="reset-btn">REFRESH DATA</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // --- MAPPING CABANG ---
        const geoMapping = {
            "0010": { name: "CB MENARA BRILIAN", lat: -6.220556, lng: 106.818444 },
            "0020": { name: "CB WARUNG JATI", lat: -6.273611, lng: 106.829167 },
            "0025": { name: "CB BEKASI", lat: -6.238472, lng: 106.975417 },
            "0110": { name: "CB BANDUNG", lat: -6.9175, lng: 107.6191 },
            "0140": { name: "CB CIREBON", lat: -6.7320, lng: 108.5523 },
            "0310": { name: "CB SEMARANG", lat: -6.9667, lng: 110.4167 },
            "0320": { name: "CB SOLO", lat: -7.5661, lng: 110.8243 },
            "0330": { name: "CB TEMANGGUNG", lat: -7.3167, lng: 110.1667 },
            "0350": { name: "CB YOGYAKARTA", lat: -7.7956, lng: 110.3695 },
            "0410": { name: "CB SURABAYA", lat: -7.2575, lng: 112.7521 },
            "0411": { name: "CB SIDOARJO", lat: -7.4478, lng: 112.7183 },
            "0420": { name: "CB MALANG", lat: -7.9839, lng: 112.6214 },
            "0430": { name: "CB LAMONGAN", lat: -7.1192, lng: 112.4153 },
            "1110": { name: "CB MEDAN", lat: 3.5952, lng: 98.6722 },
            "1310": { name: "CB PEKANBARU", lat: 0.5071, lng: 101.4478 },
            "1312": { name: "CB LUBUK DALAM", lat: 0.6125, lng: 101.8152 },
            "1313": { name: "CB UJUNG BATU", lat: 0.7042, lng: 100.5408 },
            "1314": { name: "CB AIR MOLEK", lat: -0.4578, lng: 102.2858 },
            "1315": { name: "KK DALU DALU", lat: 1.1333, lng: 100.4667 },
            "1520": { name: "CB PALEMBANG", lat: -2.9761, lng: 104.7754 },
            "1710": { name: "CB LAMPUNG", lat: -5.3971, lng: 105.2668 },
            "3210": { name: "CB MAKASSAR", lat: -5.1476, lng: 119.4327 },
            "4010": { name: "CB DENPASAR", lat: -8.6705, lng: 115.2126 }
        };

        // --- MAPPING RM ---
        const rmReference = {
            "RBO0020002108": "AULIA ZAHRA", "RBO4010002150": "NI KADEK VIDIA KRISNA DEVI",
            "RBO0025000459": "IRFAN AGUSTIAN RIZA", "RBO0025001914": "SARKIM SIMANJUTAK",
            "RBO0025002023": "MUHAMAD MOZA KANDIRA", "RBO0110002068": "ARDINO OKAJINARTA",
            "RBO0140001932": "MONICA ACHIR PUTRI", "RBO0310000656": "FITRA AMIRANTI",
            "RBO0310000731": "YUNI KUSTANTI", "RBO0320001113": "MANIK LINTANG SUH MAHLIGAI",
            "RBO0330001779": "ENDRI AGUSTIN", "RBO0330002011": "RIZQIKA ARDHANI SRI REJEKI",
            "RBO0330002012": "MUHAMMAD ADITYA MUZAKKY", "RBO0350001670": "NOVI SETYAWATI",
            "RBO0350001947": "RAMADITYA BAYU PAMUNGKAS", "RBO0350001954": "GIGIH MANGGALA",
            "RBO0350002009": "KRISNA ALI PASHA PRATAMA PUTRA", "RBO0350002075": "ANTON SUSILO PRABOWO",
            "RBO0410000579": "AKHMAD DWI PRAYUGI", "RBO0411002058": "NAUFAL FEBI MAHARDIKA",
            "RBO0411002088": "MILA AZZAHRO AINI", "RBO0420002047": "RACHMAD MAHENDRA PUTRA",
            "RBO0420002066": "YUSUF BACHRI", "RBO0430002046": "MEGA AYU LESTARI",
            "RBO0430002069": "EGA AYU PRAMITASARI", "RBO1110000220": "JUNI PURNAMA SARI SILABAN",
            "RBO1110002070": "JANSEN VERNANDO SITOHANG", "RBO1310000366": "JELI NATALIAS",
            "RBO1310000377": "DOLLY NAMORA LUBIS", "RBO1311000219": "ALPRIZA ULVI",
            "RBO1311000661": "WANRA SITUMORANG", "RBO1311001930": "HARJA GUNADI",
            "RBO1312000430": "PAJRI SUCI ANDRI", "RBO1312000583": "RUSTAMI",
            "RBO1312000712": "ROMI NOVRIZON", "RBO1312001749": "CHRISTHANTY DESRIANI PURBA",
            "RBO1312002098": "ROLY CHANDRA", "RBO1313000431": "HARRY SATRIA PUTRA",
            "RBO1313000433": "WILLY DOZAN SAPUTRA", "RBO1313000543": "POPPY ISKANDAR",
            "RBO1313001909": "NUR AZZURA", "RBO1314000765": "LUKMAN",
            "RBO1314002101": "AMIRA HUSNI", "RBO1520001819": "VINKA ANDRIYANTI",
            "RBO1520002071": "M BOY SYAHRAGA", "RBO1710000361": "RIA TIARA SARI",
            "RBO1710001958": "WAWAN SAPUTRA", "RBO1710001959": "MELA AGUSTINA",
            "RBO3210001185": "ADAM RUKMANA", "RBO0321001975": "RISKA PURNAMAYANTI",
            "RBO4010001824": "GEDE MAHAPUTRA PRIYAMBADA", "RBO4010001826": "KETUT INDRIYANI",
            "RBO4010001953": "VICTOR JOSHUA NUGROHO", "RBO0140002117": "ANGGA RISTIANA PRAYO",
            "RBO0411002063": "DIESTA FITRIA AYUNINGRUM", "RBO1520001741": "EPIK HIDAYAT",
            "RBO0025001096": "MOHAMMAD ILHAMSYAH RITO", "RBO1710001857": "VICARLIAN RINJANIE",
            "RBO0410000134": "NUR AYU MEINARSARI", "RBO1710001680": "RAWAN",
            "RBO1710001905": "RAHMAT WIDODO", "RBO0420002169": "DELLYANA SALSA",
            "RBO1314002168": "MARTA ARIADI", "RBO1314002127": "VENY LUSIANA",
            "RBO0320001973": "SYANINDITA ILHAM SHAFIRA FARAHDILA", "RBO0140002174": "RAHMIZAR REXY",
            "SLP0010000067": "DAME SONDANG", "SLP0010000436": "EKO ARIF FIRMANSYAH",
            "SLP0010000548": "GERRY KURNIAWAN", "SLP0010001007": "FAJAR HARISMA",
            "SLP0010001012": "AJENG HERNI PERMATASARI", "SLP0010001027": "DITHA AFRODITA S",
            "SLP0010001072": "REZRI DWITRAHURI", "SLP0010001114": "EKA SULISTYOWATI",
            "SLP0010001183": "DESY AYU LESTARI", "SLP0010001200": "ADHIKA WIDYANTI TARINDRA",
            "SLP0010001574": "M TEGAR PAMULA", "SLP0010001592": "FAIRNAN SUHARNOTO",
            "SLP0010001599": "DESI APRIYANI", "SLP0010001639": "WINONA REI KATYUSHA",
            "SLP0010001658": "FAIZ RIZQULLAH", "SLP0010001737": "RIYADITA HANNA KAMILAH",
            "SLP0010001761": "SUNJOYO JATMIKO", "SLP0010001767": "RANGGA WICAKSONO",
            "SLP0010001772": "DWIKA MAYA HARSANTI", "SLP0010001876": "MOCHAMAD YARA RANDIVA",
            "SLP0010001948": "TOTI ANDRENA SIAHAAN", "SLP0010001965": "DONA INDRIASTUTI",
            "SLP0010001996": "TSANIA RAHMA IZZATI", "SLP0010002003": "TIZANI AZALIA",
            "SLP0010002024": "ICHWAN FAIZ AL AMIN", "SLP0010002035": "HANISA SHERLY YANA MEILADOFA",
            "SLP0010002095": "NETHANIA KRISTIANTI", "SLP0010002114": "DHIAVANYA KASAUTA AZAHIRAH",
            "SLP0010002120": "TRI BUANA NUGRAHANTI"
        };

        var map = L.map('map').setView([-2.5489, 118.0149], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let barChart = null, trendChart = null;
        let globalRecap = {}, monthlyTrend = Array(12).fill(0);

        function formatRupiah(val) {
            if (val === 0) return "Rp 0";
            if (val >= 1e12) return "Rp " + (val / 1e12).toFixed(2) + " T";
            if (val >= 1e9) return "Rp " + (val / 1e9).toFixed(2) + " M";
            if (val >= 1e6) return "Rp " + (val / 1e6).toFixed(1) + " jt";
            return "Rp " + val.toLocaleString('id-ID');
        }

        function cleanVal(v) { return v ? parseFloat(String(v).replace(/[^0-9.-]+/g, "")) || 0 : 0; }

        function getUker(id) {
            if(!id) return null;
            let code = id.substring(0, 4);
            if (!geoMapping[code]) code = "0" + id.substring(0, 3);
            if (code === "1311") code = "0310"; 
            return geoMapping[code] ? code : null;
        }

        async function loadData() {
            try {
                // MEMBACA SATU FILE UTAMA
                const resSales = await fetch(`data_pencairan_2026.csv`);
                const resRisk = await fetch(`data_performance.csv`);

                if (!resSales.ok) throw new Error("File data_pencairan_2026.csv tidak ditemukan");
                
                const salesData = Papa.parse(await resSales.text(), { header: true, skipEmptyLines: true }).data;
                const riskData = resRisk.ok ? Papa.parse(await resRisk.text(), { header: true, skipEmptyLines: true }).data : [];

                salesData.forEach(d => {
                    let dateStr = d.tanggal_pencairan || d.TANGGAL || "";
                    if(dateStr) {
                        let month = parseInt(dateStr.split('-')[1]); 
                        if(month >= 1 && month <= 12) {
                            monthlyTrend[month-1] += cleanVal(d.approved_amount || d.PLAFOND || 0);
                        }
                    }
                });

                processData(salesData, riskData);
            } catch (e) {
                document.getElementById('loading-text').innerHTML = `<b style="color:red">${e.message}</b>`;
            }
        }

        function processData(sales, risk) {
            let recap = {};
            let totalOS = 0, totalNOA = 0, totalRisk = 0;
            
            Object.keys(geoMapping).forEach(c => {
                recap[c] = { name: geoMapping[c].name, os: 0, noa: 0, tunggakan: 0, maxDpd: 0, marketings: {}, companies: {} };
            });

            sales.forEach(item => {
                let ukerCode = getUker(item.loan_account_id || item.NOREK || "");
                if (!ukerCode) return;

                let amt = cleanVal(item.approved_amount || item.PLAFOND || 0);
                let branchName = geoMapping[ukerCode].name;

                // Ambil semua kemungkinan kolom identitas RM
                let rawMkt = (item.final_marketing_name || "").toString().trim().toUpperCase();
                let refCode = (item.referral_code || "").toString().trim().toUpperCase();
                let ukerMap = (item.UKER_MAPPING || "").toString().trim().toUpperCase();

                let mktName = null;

                // --- LOGIKA PENCARIAN RM (PRIORITAS) ---
                // 1. Cek apakah salah satu kolom mengandung kode yang ada di rmReference
                if (rmReference[rawMkt]) {
                    mktName = rmReference[rawMkt];
                } else if (rmReference[refCode]) {
                    mktName = rmReference[refCode];
                } else if (rmReference[ukerMap]) {
                    mktName = rmReference[ukerMap];
                } 
                // 2. Jika tidak ada di mapping, cek apakah ini format RBO/SLP tapi belum terdaftar
                else if (rawMkt.startsWith("RBO") || rawMkt.startsWith("SLP") || refCode.startsWith("RBO") || refCode.startsWith("SLP")) {
                    // Karena lo ga mau ada "RM LAINNYA", maka lempar ke nama Cabang
                    mktName = branchName;
                }
                // 3. Jika isinya angka saja atau kosong
                else {
                    mktName = branchName;
                }

                // Update Angka Cabang
                recap[ukerCode].os += amt;
                recap[ukerCode].noa += 1;

                // Update Angka RM (Gunakan mktName yang sudah didapat)
                if (!recap[ukerCode].marketings[mktName]) {
                    recap[ukerCode].marketings[mktName] = { os: 0, noa: 0 };
                }
                recap[ukerCode].marketings[mktName].os += amt;
                recap[ukerCode].marketings[mktName].noa += 1;

                totalOS += amt;
                totalNOA += 1;
            });

            // --- LOGIKA RISK (TETAP) ---
            risk.forEach(item => {
                let code = getUker(item.loan_account_id || item.NOREK || "");
                if (!code) return;
                let tung = cleanVal(item.total_tunggakan || item.BAKI_DEBET || 0);
                let dpd = parseInt(item.dpd || 0);
                let comp = (item.company || "ORGANIC").toUpperCase();
                
                recap[code].tunggakan += tung;
                recap[code].maxDpd = Math.max(recap[code].maxDpd, dpd);
                if (!recap[code].companies[comp]) recap[code].companies[comp] = { tunggakan: 0, dpd: 0, noaRisk: 0 };
                recap[code].companies[comp].tunggakan += tung;
                recap[code].companies[comp].dpd = Math.max(recap[code].companies[comp].dpd, dpd);
                recap[code].companies[comp].noaRisk += 1;
                totalRisk += tung;
            });

            globalRecap = recap;
            document.getElementById('total-os').innerText = formatRupiah(totalOS);
            document.getElementById('total-noa').innerText = totalNOA.toLocaleString('id-ID');
            document.getElementById('total-risk').innerText = formatRupiah(totalRisk);
            document.getElementById('loading-overlay').style.display = 'none';

            renderMarkers();
            renderTrendChart();
            updateBarChart(recap, "Top 5 Cabang (Sales)", true);
        }

        function renderMarkers() {
            Object.keys(globalRecap).forEach(c => {
                const d = globalRecap[c];
                if (d.os === 0 && d.tunggakan === 0) return;
                let color = d.maxDpd > 90 ? "#e53e3e" : (d.maxDpd > 0 ? "#f6e05e" : "#27ae60");
                let marker = L.circleMarker([geoMapping[c].lat, geoMapping[c].lng], {
                    radius: Math.max(8, Math.min(25, d.os / 250000000)),
                    fillColor: color, color: "white", weight: 2, fillOpacity: 0.8
                }).addTo(map);
                marker.bindPopup(`<b>${d.name}</b><hr>Sales: ${formatRupiah(d.os)}<br>NOA: ${d.noa}<br>Risk: ${formatRupiah(d.tunggakan)}`);
                marker.on('click', () => {
                    updateBarChart(d.marketings, `Top RM - ${d.name}`, false);
                    updateCompanyRisk(d.companies);
                });
            });
        }

        function renderTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'],
                    datasets: [{ label: 'Sales (M)', data: monthlyTrend.map(v => v / 1e9), borderColor: '#00529c', backgroundColor: 'rgba(0,82,156,0.1)', fill: true, tension: 0.4 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { font: { size: 9 } } }, x: { ticks: { font: { size: 9 } } } } }
            });
        }

        function updateBarChart(source, title, isBranch) {
            const ctx = document.getElementById('barChart').getContext('2d');
            if (barChart) barChart.destroy();
            document.getElementById('bar-title').innerText = title;
            let entries = isBranch ? Object.entries(source).map(x => [x[1].name, x[1].os, x[1].noa]) : Object.entries(source).map(x => [x[0], x[1].os, x[1].noa]);
            let sorted = entries.sort((a,b) => b[1] - a[1]).slice(0, 5);
            barChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: sorted.map(x => x[0]), datasets: [{ data: sorted.map(x => x[1]), backgroundColor: '#00529c', borderRadius: 4, noa: sorted.map(x => x[2]) }] },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => `OS: ${formatRupiah(c.parsed.x)} | NOA: ${c.dataset.noa[c.dataIndex]}` } } }, scales: { x: { display: false }, y: { ticks: { font: { size: 8 } } } } }
            });
        }

        function updateCompanyRisk(companies) {
            const list = document.getElementById('company-list');
            document.getElementById('company-info').style.display = 'block';
            const sorted = Object.entries(companies).sort((a,b) => b[1].tunggakan - a[1].tunggakan).slice(0, 5);
            list.innerHTML = sorted.map(([name, d], i) => `
                <div class="company-item">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="company-name" style="font-size:11px; font-weight:bold;">${i+1}. ${name}</span>
                        <span class="risk-badge" style="background:${d.dpd > 90 ? '#feb2b2' : (d.dpd > 0 ? '#faf089' : '#9ae6b4')}">${d.dpd} DPD</span>
                    </div>
                    <div style="font-size:10px; color:#666; margin-top:2px;">Tunggakan: <b>${formatRupiah(d.tunggakan)}</b> | ${d.noaRisk} NOA</div>
                </div>`).join('');
        }

        loadData();
    </script>
</body>
</html>
