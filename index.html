<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Flexi Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; background: #f4f7f6; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .header-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 25px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 1000; font-weight: bold; font-size: 14px; border: 1px solid #00529c;
        }
        .sidebar {
            position: absolute; top: 80px; right: 20px; width: 340px;
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 85vh; overflow-y: auto;
        }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00529c; display: flex; flex-direction: column;}
        .stat-card small { color: #666; font-size: 10px; margin-bottom: 3px; font-weight: bold; }
        .stat-card div { font-weight: bold; font-size: 15px; color: #333; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; font-weight: bold;
        }
        .loader { border: 5px solid #f3f3f3; border-radius: 50%; border-top: 5px solid #00529c; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        button.reset-btn { width: 100%; padding: 10px; font-size: 12px; cursor: pointer; background: #00529c; color: white; border: none; border-radius: 5px; margin-top: 15px; font-weight: bold; }

        .company-item { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .company-header { display: flex; justify-content: space-between; align-items: center; }
        .company-name { font-weight: bold; font-size: 11px; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; }
        .risk-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading-text">Sinkronisasi Data Sales & Risk...</div>
    </div>
    
    <div class="header-title">DASHBOARD MONITORING FLEXI</div>

    <div class="sidebar">
        <div style="display:flex; justify-content:space-between; gap:10px;">
            <div class="stat-card" style="flex:1;">
                <small>TOTAL OS BULAN INI</small>
                <div id="total-os">Rp 0</div>
            </div>
            <div class="stat-card" style="border-left-color: #27ae60; flex:1;">
                <small>TOTAL NOA</small>
                <div id="total-noa">0</div>
            </div>
        </div>
        
        <div class="stat-card" style="border-left-color: #e53e3e;">
            <small>TOTAL TUNGGAKAN (NPL/RISK)</small>
            <div id="total-risk">Rp 0</div>
        </div>
        
        <h4 id="chart-title" style="font-size: 13px; margin: 15px 0 10px; color: #333;">Top 5 Cabang (Sales)</h4>
        <div style="height: 250px; margin-bottom: 20px;"><canvas id="barChart"></canvas></div>
        
        <div id="company-info" style="display: none;">
            <h4 id="company-title" style="font-size: 12px; margin: 0 0 10px; color: #00529c; border-bottom: 2px solid #00529c; display: inline-block;">INSTANSI BERISIKO (TUNGGAKAN)</h4>
            <div id="company-list"></div>
        </div>

        <button onclick="location.reload()" class="reset-btn">REFRESH DATA</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const geoMapping = {
            "0010": { name: "CB MENARA BRILIAN", lat: -6.220556, lng: 106.818444 },
            "0020": { name: "CB WARUNG JATI", lat: -6.273611, lng: 106.829167 },
            "0025": { name: "CB BEKASI", lat: -6.238472, lng: 106.975417 },
            "0110": { name: "CB BANDUNG", lat: -6.9175, lng: 107.6191 },
            "0140": { name: "CB CIREBON", lat: -6.7320, lng: 108.5523 },
            "0310": { name: "CB SEMARANG", lat: -6.9667, lng: 110.4167 },
            "0320": { name: "CB SOLO", lat: -7.5661, lng: 110.8243 },
            "0330": { name: "CB TEMANGGUNG", lat: -7.3167, lng: 110.1667 },
            "0350": { name: "CB YOGYAKARTA", lat: -7.7956, lng: 110.3695 },
            "0410": { name: "CB SURABAYA", lat: -7.2575, lng: 112.7521 },
            "0411": { name: "CB SIDOARJO", lat: -7.4478, lng: 112.7183 },
            "0420": { name: "CB MALANG", lat: -7.9839, lng: 112.6214 },
            "0430": { name: "CB LAMONGAN", lat: -7.1192, lng: 112.4153 },
            "1110": { name: "CB MEDAN", lat: 3.5952, lng: 98.6722 },
            "1310": { name: "CB PEKANBARU", lat: 0.5071, lng: 101.4478 },
            "1312": { name: "CB LUBUK DALAM", lat: 0.6125, lng: 101.8152 },
            "1313": { name: "CB UJUNG BATU", lat: 0.7042, lng: 100.5408 },
            "1314": { name: "CB AIR MOLEK", lat: -0.4578, lng: 102.2858 },
            "1315": { name: "KK DALU DALU", lat: 1.1333, lng: 100.4667 },
            "1520": { name: "CB PALEMBANG", lat: -2.9761, lng: 104.7754 },
            "1710": { name: "CB LAMPUNG", lat: -5.3971, lng: 105.2668 },
            "3210": { name: "CB MAKASSAR", lat: -5.1476, lng: 119.4327 },
            "4010": { name: "CB DENPASAR", lat: -8.6705, lng: 115.2126 }
        };

        const rmReference = {
            "RBO0020002108": "AULIA ZAHRA", "RBO4010002150": "NI KADEK VIDIA KRISNA DEVI",
            "RBO0025000459": "IRFAN AGUSTIAN RIZA", "RBO0025001914": "SARKIM SIMANJUTAK",
            "RBO0025002023": "MUHAMAD MOZA KANDIRA", "RBO0110002068": "ARDINO OKAJINARTA",
            "RBO0140001932": "MONICA ACHIR PUTRI", "RBO0310000656": "FITRA AMIRANTI",
            "RBO0310000731": "YUNI KUSTANTI", "RBO0320001113": "MANIK LINTANG SUH MAHLIGAI",
            "RBO0330001779": "ENDRI AGUSTIN", "RBO0330002011": "RIZQIKA ARDHANI SRI REJEKI",
            "RBO0330002012": "MUHAMMAD ADITYA MUZAKKY", "RBO0350001670": "NOVI SETYAWATI",
            "RBO0350001947": "RAMADITYA BAYU PAMUNGKAS", "RBO0350001954": "GIGIH MANGGALA",
            "RBO0350002009": "KRISNA ALI PASHA PRATAMA PUTRA", "RBO0350002075": "ANTON SUSILO PRABOWO",
            "RBO0410000579": "AKHMAD DWI PRAYUGI", "RBO0411002058": "NAUFAL FEBI MAHARDIKA",
            "RBO0411002088": "MILA AZZAHRO AINI", "RBO0420002047": "RACHMAD MAHENDRA PUTRA",
            "RBO0420002066": "YUSUF BACHRI", "RBO0430002046": "MEGA AYU LESTARI",
            "RBO0430002069": "EGA AYU PRAMITASARI", "RBO1110000220": "JUNI PURNAMA SARI SILABAN",
            "RBO1110002070": "JANSEN VERNANDO SITOHANG", "RBO1310000366": "JELI NATALIAS",
            "RBO1310000377": "DOLLY NAMORA LUBIS", "RBO1311000219": "ALPRIZA ULVI",
            "RBO1311000661": "WANRA SITUMORANG", "RBO1311001930": "HARJA GUNADI",
            "RBO1312000430": "PAJRI SUCI ANDRI", "RBO1312000583": "RUSTAMI",
            "RBO1312000712": "ROMI NOVRIZON", "RBO1312001749": "CHRISTHANTY DESRIANI PURBA",
            "RBO1312002098": "ROLY CHANDRA", "RBO1313000431": "HARRY SATRIA PUTRA",
            "RBO1313000433": "WILLY DOZAN SAPUTRA", "RBO1313000543": "POPPY ISKANDAR",
            "RBO1313001909": "NUR AZZURA", "RBO1314000765": "LUKMAN",
            "RBO1314002101": "AMIRA HUSNI", "RBO1520001819": "VINKA ANDRIYANTI",
            "RBO1520002071": "M BOY SYAHRAGA", "RBO1710000361": "RIA TIARA SARI",
            "RBO1710001958": "WAWAN SAPUTRA", "RBO1710001959": "MELA AGUSTINA",
            "RBO3210001185": "ADAM RUKMANA", "RBO3210001975": "RISKA PURNAMAYANTI",
            "RBO4010001824": "GEDE MAHAPUTRA PRIYAMBADA", "RBO4010001826": "KETUT INDRIYANI",
            "RBO4010001953": "VICTOR JOSHUA NUGROHO", "RBO0140002117": "ANGGA RISTIANA PRAYO",
            "RBO0411002063": "DIESTA FITRIA AYUNINGRUM", "RBO1520001741": "EPIK HIDAYAT",
            "RBO0025001096": "MOHAMMAD ILHAMSYAH RITO", "RBO1710001857": "VICARLIAN RINJANIE",
            "RBO0410000134": "NUR AYU MEINARSARI", "RBO1710001680": "RAWAN",
            "RBO1710001905": "RAHMAT WIDODO", "RBO0420002169": "DELLYANA SALSA",
            "RBO1314002168": "MARTA ARIADI", "RBO1314002127": "VENY LUSIANA",
            "RBO0320001973": "SYANINDITA ILHAM SHAFIRA FARAHDILA", "RBO0140002174": "RAHMIZAR REXY",
            "SLP0010000067": "DAME SONDANG", "SLP0010000436": "EKO ARIF FIRMANSYAH",
            "SLP0010000548": "GERRY KURNIAWAN", "SLP0010001007": "FAJAR HARISMA",
            "SLP0010001012": "AJENG HERNI PERMATASARI", "SLP0010001027": "DITHA AFRODITA S",
            "SLP0010001072": "REZRI DWITRAHURI", "SLP0010001114": "EKA SULISTYOWATI",
            "SLP0010001183": "DESY AYU LESTARI", "SLP0010001200": "ADHIKA WIDYANTI TARINDRA",
            "SLP0010001574": "M TEGAR PAMULA", "SLP0010001592": "FAIRNAN SUHARNOTO",
            "SLP0010001599": "DESI APRIYANI", "SLP0010001639": "WINONA REI KATYUSHA",
            "SLP0010001658": "FAIZ RIZQULLAH", "SLP0010001737": "RIYADITA HANNA KAMILAH",
            "SLP0010001761": "SUNJOYO JATMIKO", "SLP0010001767": "RANGGA WICAKSONO",
            "SLP0010001772": "DWIKA MAYA HARSANTI", "SLP0010001876": "MOCHAMAD YARA RANDIVA",
            "SLP0010001948": "TOTI ANDRENA SIAHAAN", "SLP0010001965": "DONA INDRIASTUTI",
            "SLP0010001996": "TSANIA RAHMA IZZATI", "SLP0010002003": "TIZANI AZALIA",
            "SLP0010002024": "ICHWAN FAIZ AL AMIN", "SLP0010002035": "HANISA SHERLY YANA MEILADOFA",
            "SLP0010002095": "NETHANIA KRISTIANTI", "SLP0010002114": "DHIAVANYA KASAUTA AZAHIRAH",
            "SLP0010002120": "TRI BUANA NUGRAHANTI"
        };

        var map = L.map('map').setView([-2.5489, 118.0149], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let barChartInstance = null;
        let globalRecap = {};

        function cleanVal(v) {
            if (!v) return 0;
            return parseFloat(String(v).replace(/[^0-9.-]+/g, "")) || 0;
        }

        function standardizeCompanyName(name) {
            if (!name) return "ORGANIC/UMUM";
            return name.toString().toUpperCase()
                .replace(/^(PT\.|PT|PT |P\.T\.)\s+/g, '')
                .replace(/\s+(TBK|T\.BK)$/g, '')
                .trim().replace(/\s+/g, ' ');
        }

        function getUker(id) {
            if(!id) return null;
            let code = id.substring(0, 4);
            if (!geoMapping[code]) {
                let alt = "0" + id.substring(0, 3);
                if (geoMapping[alt]) code = alt;
            }
            if (code === "1311") code = "0310"; 
            return geoMapping[code] ? code : null;
        }

        async function initDashboard() {
            try {
                const now = new Date();
                const fileSales = `data_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}.csv`;
                const fileRisk = `data_performance.csv`;

                const [resSales, resRisk] = await Promise.all([
                    fetch(fileSales).catch(() => fetch(`data_${now.getFullYear()}${String(now.getMonth()).padStart(2, '0')}.csv`)),
                    fetch(fileRisk).catch(() => null)
                ]);

                if (!resSales.ok) throw new Error("File Sales tidak ditemukan");
                
                const salesText = await resSales.text();
                const riskText = resRisk && resRisk.ok ? await resRisk.text() : "";

                const salesData = Papa.parse(salesText, { header: true, skipEmptyLines: true }).data;
                const riskData = riskText ? Papa.parse(riskText, { header: true, skipEmptyLines: true }).data : [];

                processAllData(salesData, riskData);
            } catch (e) {
                document.getElementById('loading-text').innerHTML = `<span style="color:red">${e.message}</span>`;
            }
        }

        function processAllData(sales, risk) {
            let recap = {};
            let totalOS = 0, totalNOA = 0, totalRisk = 0;

            // Inisialisasi Recap
            Object.keys(geoMapping).forEach(c => {
                recap[c] = { name: geoMapping[c].name, os: 0, noa: 0, tunggakan: 0, maxDpd: 0, marketings: {}, companies: {} };
            });

            // 1. Proses Data Sales (Pencairan)
            sales.forEach(item => {
                let code = getUker(item.loan_account_id || item.NOREK || "");
                if (!code) return;

                let amt = cleanVal(item.approved_amount || item.PLAFOND || 0);
                let rawMkt = item.final_marketing_name || item.UKER_MAPPING || "Unknown";
                let mktName = rmReference[rawMkt] ? rmReference[rawMkt] : rawMkt;

                recap[code].os += amt;
                recap[code].noa += 1;
                
                // Simpan detail OS dan NOA per RM
                if (!recap[code].marketings[mktName]) {
                    recap[code].marketings[mktName] = { os: 0, noa: 0 };
                }
                recap[code].marketings[mktName].os += amt;
                recap[code].marketings[mktName].noa += 1;

                totalOS += amt;
                totalNOA += 1;
            });

            // 2. Proses Data Risk (Tunggakan)
            risk.forEach(item => {
                let code = getUker(item.loan_account_id || item.NOREK || "");
                if (!code) return;

                let tung = cleanVal(item.total_tunggakan || 0);
                let dpd = parseInt(item.dpd || 0);
                let comp = standardizeCompanyName(item.company || "ORGANIC");

                recap[code].tunggakan += tung;
                recap[code].maxDpd = Math.max(recap[code].maxDpd, dpd);

                if (!recap[code].companies[comp]) {
                    recap[code].companies[comp] = { tunggakan: 0, dpd: 0 };
                }
                recap[code].companies[comp].tunggakan += tung;
                recap[code].companies[comp].dpd = Math.max(recap[code].companies[comp].dpd, dpd);
                
                totalRisk += tung;
            });

            globalRecap = recap;
            document.getElementById('total-os').innerText = "Rp " + (totalOS/1e9).toFixed(2) + " M";
            document.getElementById('total-noa').innerText = totalNOA.toLocaleString('id-ID');
            document.getElementById('total-risk').innerText = "Rp " + (totalRisk/1e6).toFixed(1) + " jt";
            document.getElementById('loading-overlay').style.display = 'none';

            renderMarkers();
            updateChart(recap, "Top 10 Cabang (Sales)", true);
        }

        function renderMarkers() {
            Object.keys(globalRecap).forEach(c => {
                const d = globalRecap[c];
                const geo = geoMapping[c];
                if (d.os === 0 && d.tunggakan === 0) return;

                // Hijau = Lancar, Kuning = DPD 1-90, Merah = NPL > 90
                let color = d.maxDpd > 90 ? "#e53e3e" : (d.maxDpd > 0 ? "#f6e05e" : "#27ae60");
                let radius = Math.max(8, Math.min(25, d.os / 250000000));

                let marker = L.circleMarker([geo.lat, geo.lng], {
                    radius: radius, fillColor: color, color: "white", weight: 2, fillOpacity: 0.8
                }).addTo(map);

                marker.bindPopup(`<b>${d.name}</b><hr>Sales: Rp ${(d.os/1e6).toFixed(1)} jt<br>NOA: ${d.noa}<br>Tunggakan: Rp ${(d.tunggakan/1e6).toFixed(1)} jt`);
                marker.on('click', () => {
                    updateChart(d.marketings, `Top RM - ${d.name}`, false);
                    updateCompanyRisk(d.companies);
                });
            });
        }

        function updateChart(sourceData, title, isBranch) {
            const ctx = document.getElementById('barChart').getContext('2d');
            if (barChartInstance) barChartInstance.destroy();
            document.getElementById('chart-title').innerText = title;

            // Logika baru untuk handle data RM yang ada OS & NOA
            let labels = [];
            let osValues = [];
            let noaValues = [];

            if (isBranch) {
                let sorted = Object.entries(sourceData).sort((a,b) => b[1].os - a[1].os).slice(0, 5);
                labels = sorted.map(x => x[1].name);
                osValues = sorted.map(x => x[1].os);
                noaValues = sorted.map(x => x[1].noa);
            } else {
                let sorted = Object.entries(sourceData).sort((a,b) => b[1].os - a[1].os).slice(0, 10);
                labels = sorted.map(x => x[0]);
                osValues = sorted.map(x => x[1].os);
                noaValues = sorted.map(x => x[1].noa);
            }
            
            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ 
                        data: osValues, 
                        backgroundColor: '#00529c', 
                        borderRadius: 5,
                        noa: noaValues // Simpan NOA di sini untuk tooltip
                    }]
                },
                options: { 
                    indexAxis: 'y', maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let val = context.parsed.x;
                                    let noa = context.dataset.noa[context.dataIndex];
                                    return `OS: Rp ${(val/1e6).toFixed(1)}jt | NOA: ${noa}`;
                                }
                            }
                        }
                    },
                    scales: { 
                        x: { display: false }, 
                        y: { ticks: { font: { size: 9 } } } 
                    }
                }
            });
        }

        function updateCompanyRisk(companies) {
            const container = document.getElementById('company-info');
            const list = document.getElementById('company-list');
            container.style.display = 'block';

            const sorted = Object.entries(companies)
                .sort((a,b) => b[1].tunggakan - a[1].tunggakan)
                .slice(0, 10);

            list.innerHTML = sorted.length ? sorted.map((s, i) => `
                <div class="company-item">
                    <div class="company-header">
                        <div class="company-name">${i+1}. ${s[0]}</div>
                        <div class="risk-badge" style="background:${s[1].dpd > 90 ? '#e53e3e' : (s[1].dpd > 0 ? '#f6e05e' : '#27ae60')}">${s[1].dpd} DPD</div>
                    </div>
                    <div style="font-size:10px; color:#666;">Tunggakan: Rp ${s[1].tunggakan.toLocaleString('id-ID')}</div>
                </div>`).join('') : "<p style='font-size:11px;'>Tidak ada data risk.</p>";
        }

        initDashboard();
    </script>
</body>
</html>
