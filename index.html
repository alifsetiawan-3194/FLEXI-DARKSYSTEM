<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Marketing Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; background: #f4f7f6; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .header-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 25px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 1000; font-weight: bold; font-size: 14px;
        }
        .sidebar {
            position: absolute; top: 80px; right: 20px; width: 340px;
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 85vh; overflow-y: auto;
        }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00529c; display: flex; flex-direction: column;}
        .stat-card small { color: #666; font-size: 11px; margin-bottom: 3px; }
        .stat-card div { font-weight: bold; font-size: 16px; color: #333; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; font-weight: bold; text-align: center; padding: 20px;
        }
        .loader { border: 5px solid #f3f3f3; border-radius: 50%; border-top: 5px solid #00529c; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        button.reset-btn { width: 100%; padding: 10px; font-size: 12px; cursor: pointer; background: #00529c; color: white; border: none; border-radius: 5px; margin-top: 15px; font-weight: bold; }

        .company-item { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .company-header { display: flex; justify-content: space-between; align-items: center; }
        .company-name { font-weight: bold; font-size: 11px; max-width: 75%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; }
        .company-noa { color: #27ae60; font-weight: bold; font-size: 11px; }
        .company-os { color: #666; font-size: 11px; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading-text">Sedang Memproses Kolom 'Company'...</div>
    </div>
    
    <div class="header-title">MAP MONITORING PENCAIRAN FLEXI</div>

    <div class="sidebar">
        <div style="display:flex; justify-content:space-between; gap:10px;">
            <div class="stat-card" style="flex:1;">
                <small>TOTAL OS</small>
                <div id="total-os">Rp 0</div>
            </div>
            <div class="stat-card" style="border-left-color: #27ae60; flex:1;">
                <small>TOTAL NOA</small>
                <div id="total-noa">0</div>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        
        <h4 id="chart-title" style="font-size: 13px; margin: 0 0 10px; color: #333;">Top 5 Cabang (Nasional)</h4>
        <div style="height: 250px; margin-bottom: 20px;"><canvas id="barChart"></canvas></div>
        
        <div id="company-info" style="display: none;">
            <h4 style="font-size: 12px; margin: 0 0 10px; color: #00529c; border-bottom: 2px solid #00529c; display: inline-block;">TOP 10 INSTANSI / COMPANY</h4>
            <div id="company-list"></div>
        </div>

        <p id="file-info" style="font-size: 9px; color: #999; margin-top: 15px; text-align: center;"></p>
        <button onclick="location.reload()" class="reset-btn">REFRESH / RESET VIEW</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const geoMapping = {
            "0010": { name: "CB MENARA BRILIAN", lat: -6.220556, lng: 106.818444 },
            "0020": { name: "CB WARUNG JATI", lat: -6.273611, lng: 106.829167 },
            "0025": { name: "CB BEKASI", lat: -6.238472, lng: 106.975417 },
            "0110": { name: "CB BANDUNG", lat: -6.9175, lng: 107.6191 },
            "0140": { name: "CB CIREBON", lat: -6.7320, lng: 108.5523 },
            "0310": { name: "CB SEMARANG", lat: -6.9667, lng: 110.4167 },
            "0320": { name: "CB SOLO", lat: -7.5661, lng: 110.8243 },
            "0330": { name: "CB TEMANGGUNG", lat: -7.3167, lng: 110.1667 },
            "0350": { name: "CB YOGYAKARTA", lat: -7.7956, lng: 110.3695 },
            "0410": { name: "CB SURABAYA", lat: -7.2575, lng: 112.7521 },
            "0411": { name: "CB SIDOARJO", lat: -7.4478, lng: 112.7183 },
            "0420": { name: "CB MALANG", lat: -7.9839, lng: 112.6214 },
            "0430": { name: "CB LAMONGAN", lat: -7.1192, lng: 112.4153 },
            "1110": { name: "CB MEDAN", lat: 3.5952, lng: 98.6722 },
            "1310": { name: "CB PEKANBARU", lat: 0.5071, lng: 101.4478 },
            "1312": { name: "CB LUBUK DALAM", lat: 0.6125, lng: 101.8152 },
            "1313": { name: "CB UJUNG BATU", lat: 0.7042, lng: 100.5408 },
            "1314": { name: "CB AIR MOLEK", lat: -0.4578, lng: 102.2858 },
            "1315": { name: "KK DALU DALU", lat: 1.1333, lng: 100.4667 },
            "1520": { name: "CB PALEMBANG", lat: -2.9761, lng: 104.7754 },
            "1710": { name: "CB LAMPUNG", lat: -5.3971, lng: 105.2668 },
            "3210": { name: "CB MAKASSAR", lat: -5.1476, lng: 119.4327 },
            "4010": { name: "CB DENPASAR", lat: -8.6705, lng: 115.2126 }
        };

        const rmReference = {
            // (Data RM disembunyikan untuk ringkas, sama seperti sebelumnya)
        };

        var map = L.map('map').setView([-2.5489, 118.0149], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let barChartInstance = null;
        let globalRecap = {};

        function cleanVal(v) {
            if (!v) return 0;
            if (typeof v === 'number') return v;
            let res = parseFloat(String(v).replace(/[^0-9.-]+/g, ""));
            return isNaN(res) ? 0 : res;
        }

        async function loadCSV() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            let fileToTry = `data_${year}${month}.csv`;
            
            try {
                let response = await fetch(fileToTry);
                if (!response.ok) {
                    const lastMonth = String(now.getMonth()).padStart(2, '0'); 
                    fileToTry = `data_${year}${lastMonth}.csv`;
                    response = await fetch(fileToTry);
                }

                if (response.ok) {
                    document.getElementById('file-info').innerText = "File: " + fileToTry;
                    const csvString = await response.text();
                    
                    Papa.parse(csvString, {
                        header: true,
                        skipEmptyLines: 'greedy',
                        complete: function(results) {
                            if(results.data && results.data.length > 0) {
                                renderDashboard(results.data);
                            } else {
                                showError("CSV Kosong!");
                            }
                        }
                    });
                } else {
                    showError("File CSV tidak ditemukan!");
                }
            } catch (e) {
                showError("Error Load Data.");
            }
        }

        function showError(msg) {
            document.getElementById('loading-text').innerHTML = `<span style="color:red">${msg}</span>`;
            document.querySelector('.loader').style.display = 'none';
        }

        function renderDashboard(data) {
            let recap = {};
            let gOS = 0, gNOA = 0;

            data.forEach(item => {
                // Norek & Cabang
                let rawNorek = item.loan_account_id || item.LOAN_ACCOUNT_ID || item.NOREK || "";
                if (!rawNorek) return;

                let norekStr = String(rawNorek).trim();
                let code = norekStr.substring(0, 4);
                if (!geoMapping[code]) {
                    let altCode3 = "0" + norekStr.substring(0, 3);
                    if (geoMapping[altCode3]) code = altCode3;
                }
                if (code === "0311") code = "0310"; 
                if (!geoMapping[code]) return;

                // OS / Plafond
                let amt = cleanVal(item.approved_amount || item.APPROVED_AMOUNT || item.PLAFOND || item.plafond || 0);

                // Marketing
                let rawMkt = item.final_marketing_name || item.FINAL_MARKETING_NAME || item.UKER_MAPPING || geoMapping[code].name;
                let mktName = rmReference[rawMkt] ? rmReference[rawMkt] : rawMkt;

                // --- FIX LOGIC COMPANY ---
                // Mengambil dari kolom 'company' atau 'COMPANY'
                let rawComp = item.company || item.COMPANY || "ORGANIC/UMUM";
                
                // Bersihkan data jika cuma strip atau kosong
                let cleanComp = String(rawComp).trim();
                if (!cleanComp || cleanComp === "-" || cleanComp === "." || cleanComp.toLowerCase() === "nan") {
                    cleanComp = "ORGANIC/UMUM";
                } else {
                    cleanComp = cleanComp.toUpperCase(); // Biar tampilan konsisten bagus
                }

                if (!recap[code]) {
                    recap[code] = { name: geoMapping[code].name, os: 0, noa: 0, marketings: {}, companies: {} };
                }

                recap[code].os += amt;
                recap[code].noa += 1;
                
                // Grouping per Marketing
                if (!recap[code].marketings[mktName]) recap[code].marketings[mktName] = { os: 0, noa: 0 };
                recap[code].marketings[mktName].os += amt;
                recap[code].marketings[mktName].noa += 1;

                // Grouping per Company
                if (!recap[code].companies[cleanComp]) recap[code].companies[cleanComp] = { os: 0, noa: 0 };
                recap[code].companies[cleanComp].os += amt;
                recap[code].companies[cleanComp].noa += 1;

                gOS += amt; 
                gNOA += 1;
            });

            globalRecap = recap;
            document.getElementById('total-os').innerText = "Rp " + gOS.toLocaleString('id-ID');
            document.getElementById('total-noa').innerText = gNOA.toLocaleString('id-ID');
            document.getElementById('loading-overlay').style.display = 'none';

            updateMap(recap);
            updateChart(recap, "Top 5 Cabang (Nasional)", true);
        }

        function updateMap(recap) {
            map.eachLayer((layer) => { if (layer instanceof L.CircleMarker) map.removeLayer(layer); });

            Object.keys(recap).forEach(c => {
                const geo = geoMapping[c];
                let radius = Math.max(8, Math.min(25, recap[c].os / 250000000));
                
                let marker = L.circleMarker([geo.lat, geo.lng], {
                    radius: radius, fillColor: "#00529c", color: "white", weight: 2, fillOpacity: 0.8
                }).addTo(map);

                marker.bindPopup(`<b>${recap[c].name}</b><br>OS: Rp ${recap[c].os.toLocaleString('id-ID')}<br>NOA: ${recap[c].noa}`);
                
                marker.on('click', () => {
                    updateChart(recap[c].marketings, `Top RM - ${recap[c].name}`, false);
                    updateCompanyList(recap[c].companies); 
                });
            });
        }

        function updateChart(sourceData, title, isBranchMode) {
            const ctx = document.getElementById('barChart').getContext('2d');
            if (barChartInstance) barChartInstance.destroy();
            document.getElementById('chart-title').innerText = title;

            let sorted = Object.entries(sourceData).sort((a,b) => b[1].os - a[1].os).slice(0, isBranchMode ? 5 : 10);

            let labels = sorted.map(x => isBranchMode ? x[1].name : x[0]);
            let osValues = sorted.map(x => x[1].os);
            let noaValues = sorted.map(x => x[1].noa);

            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ 
                        data: osValues, 
                        backgroundColor: isBranchMode ? '#00529c' : '#27ae60', 
                        borderRadius: 5,
                        noa: noaValues 
                    }]
                },
                options: { 
                    indexAxis: 'y', maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false },
                        tooltip: { callbacks: { label: (ctx) => `OS: Rp ${ctx.parsed.x.toLocaleString('id-ID')} | NOA: ${ctx.dataset.noa[ctx.dataIndex]}` } }
                    },
                    scales: { 
                        x: { ticks: { callback: v => (v >= 1e9) ? (v/1e9).toFixed(1) + ' M' : (v/1e6).toFixed(0) + ' jt' } },
                        y: { ticks: { font: { size: 9 } } }
                    }
                }
            });
        }

        function updateCompanyList(companyData) {
            const container = document.getElementById('company-info');
            const list = document.getElementById('company-list');
            container.style.display = 'block';

            // Menampilkan top 10 instansi di cabang terpilih
            const sorted = Object.entries(companyData)
                .sort((a, b) => b[1].os - a[1].os)
                .slice(0, 10);

            list.innerHTML = sorted.map((comp, i) => {
                let osTxt = (comp[1].os >= 1e9) ? (comp[1].os / 1e9).toFixed(2) + ' M' : (comp[1].os / 1e6).toFixed(1) + ' jt';
                return `
                <div class="company-item">
                    <div class="company-header">
                        <div class="company-name">${i + 1}. ${comp[0]}</div>
                        <div class="company-noa">${comp[1].noa} NOA</div>
                    </div>
                    <div class="company-os">Rp ${osTxt}</div>
                </div>`;
            }).join('');
        }

        loadCSV();
    </script>
</body>
</html>
