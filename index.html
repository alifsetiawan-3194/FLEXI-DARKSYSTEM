<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Flexi 2026 - Fixed Logic</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; background: #f4f7f6; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .header-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 25px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 1000; font-weight: bold; font-size: 14px; border: 1px solid #00529c;
        }
        .sidebar {
            position: absolute; top: 80px; right: 20px; width: 360px;
            background: white; border-radius: 12px; padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 88vh; overflow-y: auto;
        }
        .filter-box { background: #00529c; padding: 12px; border-radius: 8px; margin-bottom: 15px; color: white; }
        .filter-select { width: 100%; padding: 8px; border-radius: 5px; border: none; margin-top: 5px; font-weight: bold; }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #00529c; }
        .stat-card small { color: #666; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .stat-card div { font-weight: bold; font-size: 16px; color: #333; }
        .chart-container { margin-bottom: 15px; padding: 10px; background: #fff; border-radius: 8px; border: 1px solid #eee; }
        .chart-label { font-size: 11px; font-weight: bold; color: #444; margin-bottom: 8px; display: block; border-left: 3px solid #00529c; padding-left: 8px; }
        .risk-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; border: 1px solid rgba(0,0,0,0.1); }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 5px solid #f3f3f3; border-radius: 50%; border-top: 5px solid #00529c; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-pin { width: 20px; height: 20px; border-radius: 50% 50% 50% 0; background: #00529c; position: absolute; transform: rotate(-45deg); border: 2px solid #fff; box-shadow: 1px 1px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading-text" style="margin-top:10px; font-weight:bold; color:#00529c;">Menghitung Ulang NOA Lancar...</div>
    </div>
    
    <div class="header-title">FLEXI STRATEGIC DASHBOARD 2026</div>

    <div class="sidebar">
        <div class="filter-box">
            <span style="font-size: 11px; font-weight: bold;">PERIODE PENCAIRAN</span>
            <select id="filter-month" class="filter-select">
                <option value="all">Semua Bulan 2026</option>
                <option value="1">Januari</option><option value="2">Februari</option>
                <option value="3">Maret</option><option value="4">April</option>
                <option value="5">Mei</option>
            </select>
        </div>

        <div style="display:flex; justify-content:space-between; gap:8px;">
            <div class="stat-card" style="flex:1;"><small>Total Sales</small><div id="total-os">Rp 0</div></div>
            <div class="stat-card" style="flex:1; border-left-color: #27ae60;"><small>Total NOA</small><div id="total-noa">0</div></div>
        </div>
        <div class="stat-card" style="border-left-color: #e53e3e;"><small>Total Tunggakan</small><div id="total-risk">Rp 0</div></div>

        <div class="chart-container">
            <span class="chart-label">Tren Sales Bulanan (Miliar)</span>
            <div style="height: 110px;"><canvas id="trendChart"></canvas></div>
        </div>
        
        <div class="chart-container">
            <span class="chart-label" id="bar-title">Top 3 Cabang</span>
            <div style="height: 140px;"><canvas id="barChart"></canvas></div>
        </div>
        
        <div id="company-info">
            <span class="chart-label">Analisa Kesehatan Instansi</span>
            <div id="company-list"></div>
        </div>
        <br>
        <button onclick="location.reload()" style="width:100%; padding:10px; cursor:pointer; font-weight:bold;">REFRESH DATA</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const geoMapping = {
            "0010": { name: "CB MENARA BRILIAN", lat: -6.220556, lng: 106.818444 },
            "0020": { name: "CB WARUNG JATI", lat: -6.273611, lng: 106.829167 },
            "0025": { name: "CB BEKASI", lat: -6.238472, lng: 106.975417 },
            "0110": { name: "CB BANDUNG", lat: -6.9175, lng: 107.6191 },
            "0140": { name: "CB CIREBON", lat: -6.7320, lng: 108.5523 },
            "0310": { name: "CB SEMARANG", lat: -6.9667, lng: 110.4167 },
            "0320": { name: "CB SOLO", lat: -7.5661, lng: 110.8243 },
            "0330": { name: "CB TEMANGGUNG", lat: -7.3167, lng: 110.1833 },
            "0350": { name: "CB YOGYAKARTA", lat: -7.7956, lng: 110.3695 },
            "0410": { name: "CB SURABAYA", lat: -7.2575, lng: 112.7521 },
            "0411": { name: "CB SIDOARJO", lat: -7.4478, lng: 112.7183 },
            "0420": { name: "CB MALANG", lat: -7.9839, lng: 112.6214 },
            "0430": { name: "CB LAMONGAN", lat: -7.1192, lng: 112.4151 },
            "1110": { name: "CB MEDAN", lat: 3.5952, lng: 98.6722 },
            "1310": { name: "CB PEKANBARU", lat: 0.5071, lng: 101.4478 },
            "1312": { name: "CB LUBUK DALAM", lat: 0.6387, lng: 101.8315 },
            "1313": { name: "CB UJUNG BATU", lat: 0.7077, lng: 100.5284 },
            "1314": { name: "CB AIR MOLEK", lat: -0.4578, lng: 102.2901 },
            "1315": { name: "KK DALU DALU", lat: 1.1074, lng: 100.4116 },
            "1520": { name: "CB PALEMBANG", lat: -2.9761, lng: 104.7754 },
            "1710": { name: "CB LAMPUNG", lat: -5.3971, lng: 105.2668 },
            "3210": { name: "CB MAKASSAR", lat: -5.1476, lng: 119.4327 },
            "4010": { name: "CB DENPASAR", lat: -8.6705, lng: 115.2126 }
        };

        var map = L.map('map').setView([-2.5489, 118.0149], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        var markersLayer = L.layerGroup().addTo(map);
        
        let barChart = null, trendChart = null;
        let rawSales = [], rawRisk = [];

        function formatRupiah(val) {
            if (!val) return "Rp 0";
            if (val >= 1e12) return "Rp " + (val / 1e12).toFixed(2) + " T";
            if (val >= 1e9) return "Rp " + (val / 1e9).toFixed(2) + " M";
            return "Rp " + Math.round(val).toLocaleString('id-ID');
        }

        function cleanVal(v) { return parseFloat(String(v || 0).replace(/[^0-9.-]+/g, "")) || 0; }

        function normalizeComp(raw) {
            if (!raw) return "ORGANIC";
            let s = raw.toUpperCase();
            if (/WEDA BAY|IWIP|WEDABAY|WEDABAI/.test(s)) return "PT. INDONESIA WEDA BAY INDUSTRIAL PARK (IWIP)";
            if (/MOROWALI|IMIP/.test(s)) return "PT. INDONESIA MOROWALI INDUSTRIAL PARK (IMIP)";
            if (/SINAR WIJAYA|SWPI/.test(s)) return "PT. SINAR WIJAYA PLYWOOD INDUSTRIES (SWPI)";
            if (/PRIMAC/.test(s)) return "PT. PRIMAC PERKASA INDONESIA";
            if (/PKSS/.test(s)) return "PT. PRIMA KARYA SARANA SEJAHTERA (PKSS)";
            return s.trim();
        }

        async function loadData() {
            try {
                const [sRes, rRes] = await Promise.all([
                    fetch('data_pencairan_2026.csv'),
                    fetch('data_performance.csv')
                ]);
                rawSales = Papa.parse(await sRes.text(), { header: true, skipEmptyLines: true }).data;
                rawRisk = rRes.ok ? Papa.parse(await rRes.text(), { header: true, skipEmptyLines: true }).data : [];
                processData();
            } catch (e) { console.error(e); }
        }

        document.getElementById('filter-month').addEventListener('change', processData);

        function processData() {
            const m = document.getElementById('filter-month').value;
            let totalOS = 0, totalNOA = 0, totalTunggakan = 0;
            let mTrend = Array(12).fill(0);
            let ukerStats = {};
            let instansiStats = {};

            // 1. Ambil SEMUA Populasi dari Sales
            rawSales.forEach(d => {
                let month = parseInt((d.tanggal_pencairan || d.TANGGAL || "").split('-')[1]);
                if (m !== 'all' && month != m) return;

                let code = String(d.loan_account_id || d.NOREK || "").substring(0, 4);
                let amt = cleanVal(d.approved_amount || d.PLAFOND);
                let nameInstansi = normalizeComp(d.company || d.INSTANSI || d.NAMA_INSTANSI);

                totalOS += amt;
                totalNOA += 1;
                if(month) mTrend[month-1] += amt;

                // Stats Cabang
                if(geoMapping[code]) {
                    if(!ukerStats[code]) ukerStats[code] = { os: 0, tung: 0 };
                    ukerStats[code].os += amt;
                }

                // Logic Lancar: Masukkan semua ke Lancar dulu
                if(!instansiStats[nameInstansi]) {
                    instansiStats[nameInstansi] = { total: 0, lancar: 0, dpk: 0, npl: 0, tung: 0, os: 0, maxDpd: 0 };
                }
                instansiStats[nameInstansi].total += 1;
                instansiStats[nameInstansi].lancar += 1;
                instansiStats[nameInstansi].os += amt;
            });

            // 2. Kurangi dengan data Risk (Macet)
            rawRisk.forEach(r => {
                let nameInstansi = normalizeComp(r.company || r.INSTANSI || r.NAMA_INSTANSI);
                let tung = cleanVal(r.total_tunggakan || 0);
                let dpd = parseInt(r.dpd || 0);
                let code = String(r.loan_account_id || r.NOREK || "").substring(0, 4);

                if (instansiStats[nameInstansi]) {
                    instansiStats[nameInstansi].tung += tung;
                    instansiStats[nameInstansi].maxDpd = Math.max(instansiStats[nameInstansi].maxDpd, dpd);
                    
                    if (dpd > 0) {
                        // Nasabah ini macet, kurangi dari jatah Lancar
                        if(instansiStats[nameInstansi].lancar > 0) instansiStats[nameInstansi].lancar -= 1;
                        
                        if (dpd > 90) instansiStats[nameInstansi].npl += 1;
                        else instansiStats[nameInstansi].dpk += 1;
                    }
                }
                
                if(ukerStats[code]) ukerStats[code].tung += tung;
                totalTunggakan += tung;
            });

            // Update UI
            document.getElementById('total-os').innerText = formatRupiah(totalOS);
            document.getElementById('total-noa').innerText = totalNOA;
            document.getElementById('total-risk').innerText = formatRupiah(totalTunggakan);
            document.getElementById('loading-overlay').style.display = 'none';

            renderMapMarkers(ukerStats);
            renderTrend(mTrend);
            updateBar(ukerStats);
            updateCompanyList(instansiStats);
        }

        function renderMapMarkers(stats) {
            markersLayer.clearLayers();
            Object.keys(stats).forEach(code => {
                if(geoMapping[code]) {
                    const pin = L.divIcon({ className: 'custom-div-icon', html: `<div class='custom-pin'></div>`, iconSize: [20, 20] });
                    L.marker([geoMapping[code].lat, geoMapping[code].lng], {icon: pin}).addTo(markersLayer)
                     .bindPopup(`<b>${geoMapping[code].name}</b><br>Sales: ${formatRupiah(stats[code].os)}<br>Tunggakan: ${formatRupiah(stats[code].tung)}`);
                }
            });
        }

        function updateCompanyList(data) {
            const list = document.getElementById('company-list');
            const sorted = Object.entries(data)
                .sort((a,b) => b[1].tung - a[1].tung)
                .slice(0, 5);

            list.innerHTML = sorted.map(([name, stat]) => `
                <div style="border-bottom:1px solid #eee; padding:10px 0;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="font-size:10px; color:#00529c;">${name}</b>
                        <span class="risk-badge" style="background:${stat.maxDpd > 90 ? '#fed7d7' : '#fefcbf'}">${stat.maxDpd} DPD</span>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; font-size:10px; margin-top:5px; color:#444;">
                        <span style="color:green;">Lancar: <b>${stat.lancar}</b></span>
                        <span style="text-align:right">Total: <b>${stat.total}</b></span>
                        <span style="color:orange;">DPK: ${stat.dpk}</span>
                        <span style="text-align:right; color:red;">NPL: ${stat.npl}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:4px; font-weight:bold; font-size:11px;">
                        <span style="color:#777;">OS: ${formatRupiah(stat.os)}</span>
                        <span style="color:#e53e3e;">Tung: ${formatRupiah(stat.tung)}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderTrend(data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if(trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
                    datasets: [{ label: 'Miliar', data: data.map(v => v/1e9), borderColor: '#00529c', tension: 0.3, fill: true, backgroundColor: 'rgba(0,82,156,0.1)' }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function updateBar(stats) {
            const ctx = document.getElementById('barChart').getContext('2d');
            if(barChart) barChart.destroy();
            let sorted = Object.entries(stats).sort((a,b) => b[1].os - a[1].os).slice(0, 3);
            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(x => geoMapping[x[0]].name.replace("CB ","")),
                    datasets: [{ data: sorted.map(x => x[1].os), backgroundColor: '#00529c' }]
                },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        loadData();
    </script>
</body>
</html>
