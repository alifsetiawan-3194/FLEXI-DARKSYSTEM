<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Flexi 2026 - Final Stable</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; background: #f4f7f6; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .header-title {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 25px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 1000; font-weight: bold; font-size: 14px; border: 1px solid #00529c;
        }
        .sidebar {
            position: absolute; top: 80px; right: 20px; width: 360px;
            background: white; border-radius: 12px; padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 88vh; overflow-y: auto;
        }
        .filter-box { background: #00529c; padding: 12px; border-radius: 8px; margin-bottom: 15px; color: white; }
        .filter-select { width: 100%; padding: 8px; border-radius: 5px; border: none; margin-top: 5px; font-weight: bold; cursor: pointer; }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #00529c; }
        .stat-card small { color: #666; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .stat-card div { font-weight: bold; font-size: 16px; color: #333; }
        .chart-container { margin-bottom: 15px; padding: 10px; background: #fff; border-radius: 8px; border: 1px solid #eee; }
        .chart-label { font-size: 11px; font-weight: bold; color: #444; margin-bottom: 8px; display: block; border-left: 3px solid #00529c; padding-left: 8px; }
        .risk-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; border: 1px solid rgba(0,0,0,0.1); }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 5px solid #f3f3f3; border-radius: 50%; border-top: 5px solid #00529c; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-pin { width: 20px; height: 20px; border-radius: 50% 50% 50% 0; background: #00529c; position: absolute; transform: rotate(-45deg); border: 2px solid #fff; box-shadow: 1px 1px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading-text" style="margin-top:10px; font-weight:bold; color:#00529c;">Menyinkronkan Data Sales & Risk...</div>
    </div>
    
    <div class="header-title">FLEXI STRATEGIC DASHBOARD 2026</div>

    <div class="sidebar">
        <div class="filter-box">
            <span style="font-size: 11px; font-weight: bold;">PERIODE PENCAIRAN</span>
            <select id="filter-month" class="filter-select">
                <option value="all">Semua Bulan 2026</option>
                <option value="1">Januari</option><option value="2">Februari</option>
                <option value="3">Maret</option><option value="4">April</option>
                <option value="5">Mei</option>
            </select>
        </div>

        <div style="display:flex; justify-content:space-between; gap:8px;">
            <div class="stat-card" style="flex:1;"><small>Total Sales</small><div id="total-os">Rp 0</div></div>
            <div class="stat-card" style="flex:1; border-left-color: #27ae60;"><small>Total NOA</small><div id="total-noa">0</div></div>
        </div>
        <div class="stat-card" style="border-left-color: #e53e3e;"><small>Total Tunggakan (Risk)</small><div id="total-risk">Rp 0</div></div>

        <div class="chart-container">
            <span class="chart-label">Tren Sales Bulanan (Miliar)</span>
            <div style="height: 110px;"><canvas id="trendChart"></canvas></div>
        </div>
        
        <div class="chart-container">
            <span class="chart-label" id="bar-title">Top 3 Cabang</span>
            <div style="height: 140px;"><canvas id="barChart"></canvas></div>
        </div>
        
        <div id="company-info">
            <span class="chart-label">Top 5 Instansi (Health Monitoring)</span>
            <div id="company-list"></div>
        </div>
        <br>
        <button onclick="location.reload()" style="width:100%; padding:10px; cursor:pointer; font-weight:bold; border-radius:5px; border:1px solid #ccc;">REFRESH DASHBOARD</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const geoMapping = {
            "0010": { name: "CB MENARA BRILIAN", lat: -6.220556, lng: 106.818444 },
            "0020": { name: "CB WARUNG JATI", lat: -6.273611, lng: 106.829167 },
            "0025": { name: "CB BEKASI", lat: -6.238472, lng: 106.975417 },
            "0110": { name: "CB BANDUNG", lat: -6.9175, lng: 107.6191 },
            "0140": { name: "CB CIREBON", lat: -6.7320, lng: 108.5523 },
            "0310": { name: "CB SEMARANG", lat: -6.9667, lng: 110.4167 },
            "0320": { name: "CB SOLO", lat: -7.5661, lng: 110.8243 },
            "0330": { name: "CB TEMANGGUNG", lat: -7.3167, lng: 110.1833 },
            "0350": { name: "CB YOGYAKARTA", lat: -7.7956, lng: 110.3695 },
            "0410": { name: "CB SURABAYA", lat: -7.2575, lng: 112.7521 },
            "0411": { name: "CB SIDOARJO", lat: -7.4478, lng: 112.7183 },
            "0420": { name: "CB MALANG", lat: -7.9839, lng: 112.6214 },
            "0430": { name: "CB LAMONGAN", lat: -7.1192, lng: 112.4151 },
            "1110": { name: "CB MEDAN", lat: 3.5952, lng: 98.6722 },
            "1310": { name: "CB PEKANBARU", lat: 0.5071, lng: 101.4478 },
            "1312": { name: "CB LUBUK DALAM", lat: 0.6387, lng: 101.8315 },
            "1313": { name: "CB UJUNG BATU", lat: 0.7077, lng: 100.5284 },
            "1314": { name: "CB AIR MOLEK", lat: -0.4578, lng: 102.2901 },
            "1315": { name: "KK DALU DALU", lat: 1.1074, lng: 100.4116 },
            "1520": { name: "CB PALEMBANG", lat: -2.9761, lng: 104.7754 },
            "1710": { name: "CB LAMPUNG", lat: -5.3971, lng: 105.2668 },
            "3210": { name: "CB MAKASSAR", lat: -5.1476, lng: 119.4327 },
            "4010": { name: "CB DENPASAR", lat: -8.6705, lng: 115.2126 }
        };

        const companyLocations = {
            "PT. INDONESIA WEDA BAY INDUSTRIAL PARK (IWIP)": { lat: 0.5015, lng: 127.9150 },
            "PT. INDONESIA MOROWALI INDUSTRIAL PARK (IMIP)": { lat: -2.8450, lng: 122.1520 },
            "PT. SINAR WIJAYA PLYWOOD INDUSTRIES (SWPI)": { lat: -1.4789, lng: 102.1345 },
            "PT. PRIMA KARYA SARANA SEJAHTERA (PKSS)": { lat: -6.2205, lng: 106.8184 }
        };

        var map = L.map('map').setView([-2.5489, 118.0149], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        var markersLayer = L.layerGroup().addTo(map);
        var riskAreasLayer = L.layerGroup().addTo(map);

        let barChart = null, trendChart = null;
        let globalRecap = {}, nationalCompanyStats = {}, rawSales = [], rawRisk = [];

        function formatRupiah(val) {
            if (!val) return "Rp 0";
            if (val >= 1e12) return "Rp " + (val / 1e12).toFixed(2) + " T";
            if (val >= 1e9) return "Rp " + (val / 1e9).toFixed(2) + " M";
            return "Rp " + Math.round(val).toLocaleString('id-ID');
        }

        function cleanVal(v) { return parseFloat(String(v || 0).replace(/[^0-9.-]+/g, "")) || 0; }

        function getUker(id) {
            let idStr = String(id || "").substring(0, 4);
            return geoMapping[idStr] ? idStr : null;
        }

        async function loadData() {
            try {
                const [sRes, rRes] = await Promise.all([
                    fetch('data_pencairan_2026.csv'),
                    fetch('data_performance.csv')
                ]);
                rawSales = Papa.parse(await sRes.text(), { header: true, skipEmptyLines: true }).data;
                rawRisk = rRes.ok ? Papa.parse(await rRes.text(), { header: true, skipEmptyLines: true }).data : [];
                applyFilters();
            } catch (e) { 
                document.getElementById('loading-text').innerText = "Gagal Memuat File CSV!";
            }
        }

        function applyFilters() {
            const m = document.getElementById('filter-month').value;
            const filteredSales = rawSales.filter(d => {
                if (m === 'all') return true;
                let date = d.tanggal_pencairan || d.TANGGAL || "";
                return parseInt(date.split('-')[1]) == m;
            });
            processData(filteredSales, rawRisk);
        }

        document.getElementById('filter-month').addEventListener('change', applyFilters);

        function processData(sales, risk) {
            let recap = {};
            let totalOS = 0, totalNOA = 0, totalRiskAmt = 0;
            let mTrend = Array(12).fill(0);
            nationalCompanyStats = {};

            // Inisialisasi Uker
            Object.keys(geoMapping).forEach(c => {
                recap[c] = { name: geoMapping[c].name, os: 0, noa: 0, tunggakan: 0, marketings: {} };
            });

            // 1. Proses DATABASE UTAMA (Sales)
            sales.forEach(d => {
                let code = getUker(d.loan_account_id || d.NOREK);
                let amt = cleanVal(d.approved_amount || d.PLAFOND);
                let month = parseInt((d.tanggal_pencairan || d.TANGGAL || "").split('-')[1]);
                
                let rawComp = (d.company || d.INSTANSI || "ORGANIC").toUpperCase().trim();
                let comp = rawComp;
                if (/WEDA BAY|IWIP|WEDABAY|WEDABAI/.test(rawComp)) comp = "PT. INDONESIA WEDA BAY INDUSTRIAL PARK (IWIP)";
                else if (/MOROWALI|IMIP/.test(rawComp)) comp = "PT. INDONESIA MOROWALI INDUSTRIAL PARK (IMIP)";
                else if (/SINAR WIJAYA|SWPI/.test(rawComp)) comp = "PT. SINAR WIJAYA PLYWOOD INDUSTRIES (SWPI)";

                // Hitung Nasional per Instansi (Lancar by default)
                if (!nationalCompanyStats[comp]) {
                    nationalCompanyStats[comp] = { tunggakan: 0, bakiDebet: 0, dpd: 0, noaLancar: 0, noaDPK: 0, noaNPL: 0, totalNOA: 0 };
                }
                nationalCompanyStats[comp].totalNOA += 1;
                nationalCompanyStats[comp].noaLancar += 1;
                nationalCompanyStats[comp].bakiDebet += amt;

                if(recap[code]) {
                    recap[code].os += amt;
                    recap[code].noa += 1;
                    let mkt = (d.final_marketing_name || "RM").toUpperCase().trim();
                    recap[code].marketings[mkt] = (recap[code].marketings[mkt] || 0) + amt;
                }
                totalOS += amt;
                totalNOA += 1;
                if(month) mTrend[month-1] += amt;
            });

            // 2. Proses DATA RISK (Update Status dari Lancar ke DPK/NPL)
            risk.forEach(item => {
                let code = getUker(item.loan_account_id || item.NOREK);
                let tung = cleanVal(item.total_tunggakan || 0);
                let dpd = parseInt(item.dpd || 0);
                let rawComp = (item.company || item.INSTANSI || "ORGANIC").toUpperCase().trim();
                
                let comp = rawComp;
                if (/WEDA BAY|IWIP|WEDABAY|WEDABAI/.test(rawComp)) comp = "PT. INDONESIA WEDA BAY INDUSTRIAL PARK (IWIP)";
                else if (/MOROWALI|IMIP/.test(rawComp)) comp = "PT. INDONESIA MOROWALI INDUSTRIAL PARK (IMIP)";

                if (nationalCompanyStats[comp]) {
                    nationalCompanyStats[comp].tunggakan += tung;
                    nationalCompanyStats[comp].dpd = Math.max(nationalCompanyStats[comp].dpd, dpd);
                    
                    if (dpd > 0) {
                        if (nationalCompanyStats[comp].noaLancar > 0) nationalCompanyStats[comp].noaLancar -= 1;
                        if (dpd > 90) nationalCompanyStats[comp].noaNPL += 1;
                        else nationalCompanyStats[comp].noaDPK += 1;
                    }
                }

                if(recap[code]) recap[code].tunggakan += tung;
                totalRiskAmt += tung;
            });

            globalRecap = recap;
            document.getElementById('total-os').innerText = formatRupiah(totalOS);
            document.getElementById('total-noa').innerText = totalNOA.toLocaleString('id-ID');
            document.getElementById('total-risk').innerText = formatRupiah(totalRiskAmt);
            document.getElementById('loading-overlay').style.display = 'none';

            renderMarkers();
            renderRiskAreas();
            renderTrendChart(mTrend);
            updateBarChart(recap, "Top 3 Cabang (Sales)", true);
            updateCompanyRisk(nationalCompanyStats);
        }

        function renderMarkers() {
            markersLayer.clearLayers();
            Object.keys(globalRecap).forEach(code => {
                const uker = globalRecap[code];
                if (uker.os > 0) {
                    const pin = L.divIcon({ className: 'custom-div-icon', html: `<div class='custom-pin'></div>`, iconSize: [20, 20], iconAnchor: [10, 20] });
                    L.marker([geoMapping[code].lat, geoMapping[code].lng], { icon: pin })
                        .addTo(markersLayer)
                        .bindPopup(`<b>${uker.name}</b><hr>Sales: ${formatRupiah(uker.os)}<br>Tunggakan: ${formatRupiah(uker.tunggakan)}`);
                }
            });
        }

        function renderRiskAreas() {
            riskAreasLayer.clearLayers();
            Object.entries(nationalCompanyStats).forEach(([name, data]) => {
                if (companyLocations[name] && (data.noaDPK + data.noaNPL) > 0) {
                    const loc = companyLocations[name];
                    const color = data.dpd > 90 ? '#e53e3e' : '#f6ad55';
                    L.circle([loc.lat, loc.lng], { color: color, fillColor: color, fillOpacity: 0.2, radius: 100000 }).addTo(riskAreasLayer)
                        .bindPopup(`<b>${name}</b><hr>Total NOA: ${data.totalNOA}<br>NPL/DPK: ${data.noaDPK + data.noaNPL}<br>Tunggakan: ${formatRupiah(data.tunggakan)}`);
                }
            });
        }

        function updateCompanyRisk(comps) {
            const list = document.getElementById('company-list');
            const sorted = Object.entries(comps)
                .sort((a, b) => b[1].tunggakan - a[1].tunggakan)
                .slice(0, 5);

            list.innerHTML = sorted.map(([n, d]) => `
                <div style="border-bottom:1px solid #edf2f7; padding:10px 0;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="font-size:10px; color:#2d3748;">${n}</b>
                        <span class="risk-badge" style="background:${d.dpd > 90 ? '#fed7d7':'#fefcbf'}; color:${d.dpd > 90 ? '#9b2c2c':'#975a16'}">${d.dpd} DPD</span>
                    </div>
                    <div style="font-size:10px; margin-top:5px; display:grid; grid-template-columns:1fr 1fr; gap:2px;">
                        <span style="color:#38a169">Lancar: <b>${d.noaLancar}</b></span>
                        <span style="text-align:right">Total NOA: <b>${d.totalNOA}</b></span>
                        <span style="color:#d69e2e">DPK: ${d.noaDPK}</span>
                        <span style="text-align:right; color:#e53e3e">NPL: ${d.noaNPL}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:5px; font-weight:bold;">
                        <small style="color:#718096">OS: ${formatRupiah(d.bakiDebet)}</small>
                        <small style="color:#e53e3e">Tung: ${formatRupiah(d.tunggakan)}</small>
                    </div>
                </div>`).join('');
        }

        function renderTrendChart(data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
                    datasets: [{ label: 'Miliar', data: data.map(v => v/1e9), borderColor: '#00529c', tension: 0.3, fill: true, backgroundColor: 'rgba(0,82,156,0.1)', pointRadius: 2 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } }
            });
        }

        function updateBarChart(source, title, isBranch) {
            const ctx = document.getElementById('barChart').getContext('2d');
            document.getElementById('bar-title').innerText = title;
            if (barChart) barChart.destroy();
            let entries = isBranch ? Object.entries(source).map(x => [x[1].name, x[1].os]) : Object.entries(source);
            let sorted = entries.filter(x => x[1] > 0).sort((a,b) => b[1]-a[1]).slice(0, 3);
            barChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: sorted.map(x => x[0]), datasets: [{ data: sorted.map(x => x[1]), backgroundColor: '#00529c' }] },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } }
            });
        }

        loadData();
    </script>
</body>
</html>
